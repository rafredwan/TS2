<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TS2 — Research Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn 0.15s ease}
.modal-box{background:var(--surface);border-radius:var(--rlg);padding:28px 28px 24px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.18);animation:slideUp 0.2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-icon{width:52px;height:52px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--green)}
.modal-title{font-size:17px;font-weight:600;text-align:center;margin-bottom:6px}
.modal-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:center}
/* ── FINAL SUBMISSION BUTTON ── */
.final-submit-wrap{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center}
.btn-final{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:var(--r);font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:not-allowed;border:1.5px solid var(--border-md);background:var(--surface2);color:var(--text3);transition:all 0.2s}
.btn-final.ready{background:var(--green);border-color:var(--green);color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(14,159,110,0.35)}
.btn-final.ready:hover{background:#0b8a5e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,159,110,0.4)}
/* calendar add buttons */
.cal-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.cal-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--rsm);font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--border-md);transition:all 0.15s;cursor:pointer}
.cal-btn:hover{box-shadow:0 2px 6px rgba(0,0,0,0.1);transform:translateY(-1px)}
.cal-btn-google{background:#fff;color:#3c4043;border-color:#dadce0}
.cal-btn-google:hover{background:#f8f9fa}
.cal-btn-outlook{background:#0078d4;color:#fff;border-color:#0078d4}
.cal-btn-outlook:hover{background:#106ebe}
/* ── NOTIFICATIONS ── */
.notif-panel{position:fixed;top:58px;right:20px;width:360px;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--rlg);box-shadow:0 8px 32px rgba(0,0,0,0.14);z-index:500;animation:slideUp 0.18s ease;overflow:hidden}
.notif-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.notif-header-title{font-size:14px;font-weight:600}
.notif-mark-read{font-size:12px;color:var(--blue);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;font-weight:500}
.notif-mark-read:hover{text-decoration:underline}
.notif-list{max-height:420px;overflow-y:auto}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--surface2)}
.notif-item.unread{background:#FAFBFF}
.notif-item.unread::before{content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--blue)}
.notif-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.notif-desc{font-size:12px;color:var(--text2);line-height:1.5}
.notif-time{font-size:11px;color:var(--text3);margin-top:3px}
.notif-empty{padding:28px;text-align:center;color:var(--text3);font-size:13px}
.bell-wrap{position:relative;display:inline-flex}
.bell-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;background:var(--red);border-radius:50%;border:2px solid var(--surface);pointer-events:none}
.final-hint{font-size:12px;color:var(--text3);margin-top:8px}
</style>
<style>
:root{
  --bg:#F4F3EF;
  --surface:#FFFFFF;
  --surface2:#F0EEE9;
  --surface3:#E8E6E0;
  --border:rgba(0,0,0,0.07);
  --border-md:rgba(0,0,0,0.12);
  --border-strong:rgba(0,0,0,0.18);
  --text:#1A1916;
  --text2:#6B6860;
  --text3:#A8A59E;
  --blue:#1A56DB;
  --blue-light:#EEF3FD;
  --blue-mid:#B5D4F4;
  --blue-dark:#0C447C;
  --green:#0E9F6E;
  --green-light:#E8F8F2;
  --green-dark:#065F46;
  --amber:#D97706;
  --amber-light:#FEF3C7;
  --amber-dark:#78350F;
  --red:#E02424;
  --red-light:#FDE8E8;
  --red-dark:#771D1D;
  --purple:#7E3AF2;
  --purple-light:#F3EEFF;
  --purple-dark:#4A1D96;
  --r:10px;--rsm:6px;--rlg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{color:#fff;width:20px;height:20px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}

.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-light);color:var(--blue)}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke-width:1.8}
.nav-item .nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 6px;border-radius:999px;background:var(--blue);color:#fff}

.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background 0.15s}
.user-chip:hover{background:var(--surface2)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{width:32px;height:32px;border-radius:var(--rsm);border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background 0.15s}
.back-btn:hover{background:var(--surface2)}
.topbar-title{font-size:16px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--text3);margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:8px}

.content{flex:1;overflow-y:auto;padding:28px 32px}
.content.centered{display:flex;align-items:center;justify-content:center}
.content.no-pad{padding:0;overflow:hidden;display:flex;flex-direction:column}

/* ── COMPONENTS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:20px;margin-bottom:14px}
.card-sm{padding:14px 16px}
.card-click{cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.card-click:hover{border-color:var(--border-md);box-shadow:0 2px 8px rgba(0,0,0,0.06)}

.label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
h1{font-size:24px;font-weight:600;line-height:1.25;letter-spacing:-0.3px}
h2{font-size:18px;font-weight:600;letter-spacing:-0.2px}
h3{font-size:15px;font-weight:600}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
.b-green{background:var(--green-light);color:var(--green-dark)}
.b-amber{background:var(--amber-light);color:var(--amber-dark)}
.b-blue{background:var(--blue-light);color:var(--blue-dark)}
.b-red{background:var(--red-light);color:var(--red-dark)}
.b-purple{background:var(--purple-light);color:var(--purple-dark)}
.b-gray{background:var(--surface2);color:var(--text2)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r);border:1px solid var(--border-md);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#1446b8;border-color:#1446b8}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:var(--rsm)}
.btn-icon{width:34px;height:34px;padding:0;flex-shrink:0}

.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border-md);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,0.08)}
.field textarea{resize:none;height:88px;line-height:1.5}

.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.prog-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;transition:width 0.4s}
.tag{display:inline-block;font-size:12px;padding:3px 10px;border-radius:999px;background:var(--surface2);color:var(--text2);margin:2px}

/* ── LOGIN ── */
.login-box{width:420px;text-align:center}
.login-logo-big{width:72px;height:72px;background:var(--blue);border-radius:20px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.login-logo-big svg{color:#fff;width:36px;height:36px}

/* ── COURSES ── */
.course-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── TOPIC ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.cat-item{padding:10px 14px;border:1px solid var(--border-md);border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;text-align:center}
.cat-item:hover{border-color:var(--blue);color:var(--blue)}
.cat-item.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}

/* ── SUPERVISOR ── */
.sup-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.sup-card{border:1px solid var(--border);border-radius:var(--rlg);padding:18px;cursor:pointer;transition:all 0.15s}
.sup-card:hover{border-color:var(--border-md);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sup-card.selected{border-color:var(--blue);border-width:1.5px;box-shadow:0 0 0 3px rgba(26,86,219,0.08)}
.sup-card.full{opacity:0.55;cursor:default}
.sup-card.full:hover{border-color:var(--border);box-shadow:none}

/* ── GROUP ── */
.type-toggle{display:flex;border:1px solid var(--border-md);border-radius:var(--r);overflow:hidden;width:240px}
.type-btn{flex:1;padding:9px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;border:none;background:none;cursor:pointer;color:var(--text2);transition:all 0.15s}
.type-btn.active{background:var(--blue);color:#fff}
.member-chip{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--rsm);padding:7px 12px;margin-bottom:6px}

/* ── DASHBOARD ── */
.dash-header{background:var(--blue);border-radius:var(--rlg);padding:24px 28px;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:40px}
.pct-big{font-size:48px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-2px;line-height:1}
.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wk-card{border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all 0.15s;background:var(--surface)}
.wk-card:hover{border-color:var(--border-md);box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.wk-card.done{border-color:var(--green);background:var(--green-light)}
.wk-card.active-wk{border-color:var(--blue);border-width:1.5px}
.wk-card.locked{opacity:0.45;cursor:default}
.wk-card.locked:hover{border-color:var(--border);box-shadow:none}

/* ── WEEK DETAIL ── */
.week-detail-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check svg{width:12px;height:12px;color:transparent}
.task-check.done svg{color:#fff}

/* ── MEETINGS ── */
.meetings-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
.slot-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.slot{padding:8px 14px;border:1px solid var(--border-md);border-radius:var(--rsm);font-size:13px;cursor:pointer;transition:all 0.15s;background:var(--surface)}
.slot:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.slot.taken{background:var(--surface2);color:var(--text3);text-decoration:line-through;pointer-events:none}
.slot.booked{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:600;pointer-events:none}
.meeting-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.meeting-row:last-child{border-bottom:none}

/* ── FILES ── */
.files-shell{display:grid;grid-template-columns:280px 1fr;height:100%;overflow:hidden;gap:0}
.files-list-panel{border-right:1px solid var(--border);overflow-y:auto;padding:16px 12px}
.files-chat-panel{display:flex;flex-direction:column;overflow:hidden;height:100%}
.file-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--r);cursor:pointer;transition:background 0.15s;margin-bottom:2px}
.file-row:hover{background:var(--surface2)}
.file-row.active{background:var(--blue-light)}
.file-ico{width:38px;height:38px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ico-pdf{background:var(--red-light);color:var(--red-dark)}
.ico-doc{background:var(--blue-light);color:var(--blue-dark)}
.ico-note{background:var(--purple-light);color:var(--purple-dark)}
.upload-zone{border:1.5px dashed var(--border-strong);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:10px}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-light)}
/* chat */
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:var(--bg)}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:8px;background:var(--bg)}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-bubble{max-width:68%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg-bubble.mine{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:11px;color:var(--text3);margin-top:3px;text-align:right}
.msg-time.theirs{text-align:left}
.chat-input-bar{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;gap:8px;align-items:flex-end}
.chat-input-bar textarea{flex:1;padding:9px 12px;border:1px solid var(--border-md);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;height:42px;max-height:120px;outline:none;background:var(--bg);color:var(--text);transition:border-color 0.15s;line-height:1.4}
.chat-input-bar textarea:focus{border-color:var(--blue);background:#fff}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1A1916;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIM ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn 0.2s ease}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" style="display: none;">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"></path></svg>
        </div>
        <div>
          <div class="logo-text">TS2 Research</div>
          <div class="logo-sub">CBS · Master thesis</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip">
        <div class="avatar" style="width:34px;height:34px;background:var(--blue-light);color:var(--blue-dark);font-size:12px">RA</div>
        <div style="min-width:0">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Redwan Ahmed</div>
          <div style="font-size:11px;color:var(--text3)">au803318@uni.au.dk </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main area -->

/* ═══════════════ CALENDAR HELPERS ═══════════════ */
function parseSlotDate(label){
  // label format: "Mon 2 Jun · 14:00"
  var months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  var parts=label.split(' · ');
  var dateParts=parts[0].split(' '); // ["Mon","2","Jun"]
  var timeParts=parts[1].split(':'); // ["14","00"]
  var d=new Date(2026, months[dateParts[2]], parseInt(dateParts[1]),
    parseInt(timeParts[0]), parseInt(timeParts[1]));
  return d;
}
function toGCalDate(d){
  return d.getFullYear()
    +pad(d.getMonth()+1)+pad(d.getDate())
    +'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
}
function pad(n){return String(n).padStart(2,'0');}
function googleCalUrl(slot, supName){
  var start=parseSlotDate(slot.l);
  var end=new Date(start.getTime()+45*60000);
  var title=encodeURIComponent('Thesis meeting with '+supName);
  var details=encodeURIComponent('Supervision meeting — TS2 Master thesis\nOnline via Teams');
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+title
    +'&dates='+toGCalDate(start)+'/'+toGCalDate(end)
    +'&details='+details;
}
function outlookCalUrl(slot, supName){
  var start=parseSlotDate(slot.l);
  var end=new Date(start.getTime()+45*60000);
  var title=encodeURIComponent('Thesis meeting with '+supName);
  var body=encodeURIComponent('Supervision meeting — TS2 Master thesis. Online via Teams.');
  return 'https://outlook.live.com/calendar/0/deeplink/compose?subject='+title
    +'&startdt='+start.toISOString()
    +'&enddt='+end.toISOString()
    +'&body='+body
    +'&path=%2Fcalendar%2Faction%2Fcompose';
}

function unreadCount(){ return NOTIFS.filter(function(n){return !n.read;}).length; }

function showNotifPanel(){
  // remove if already open
  var existing=document.getElementById('notif-panel');
  if(existing){existing.remove();return;}
  var unread=unreadCount();
  var items=NOTIFS.map(function(n){
    var iconPath=notifIcons[n.type]||notifIcons.note;
    return '<div class="notif-item'+(n.read?'':' unread')+'" data-notif-id="'+n.id+'">'
      +'<div class="notif-icon" style="background:'+n.color+';color:'+n.iconColor+'">'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+iconPath+'</svg>'
      +'</div>'
      +'<div class="notif-body">'
      +'<p class="notif-title">'+n.title+'</p>'
      +'<p class="notif-desc">'+n.desc+'</p>'
      +'<p class="notif-time">'+n.time+'</p>'
      +'</div>'
      +'</div>';
  }).join('');
  var panel=document.createElement('div');
  panel.className='notif-panel';
  panel.id='notif-panel';
  panel.innerHTML='<div class="notif-header">'
    +'<span class="notif-header-title">Notifications'+(unread>0?' <span style="background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:999px;font-weight:600;margin-left:4px">'+unread+'</span>':'')+'</span>'
    +'<button class="notif-mark-read" id="btn-mark-all">Mark all as read</button>'
    +'</div>'
    +'<div class="notif-list">'+(items||'<div class="notif-empty">No notifications</div>')+'</div>';
  document.body.appendChild(panel);

  // mark all read
  document.getElementById('btn-mark-all').addEventListener('click',function(e){
    e.stopPropagation();
    NOTIFS.forEach(function(n){n.read=true;});
    panel.remove();
    renderTopbar(); // refresh bell dot
    attachEvents(S.screen);
  });

  // mark individual read on click
  panel.querySelectorAll('[data-notif-id]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var id=parseInt(this.getAttribute('data-notif-id'));
      NOTIFS[id].read=true;
      this.classList.remove('unread');
      renderTopbar();
      attachEvents(S.screen);
    });
  });

  // close when clicking outside
  setTimeout(function(){
    document.addEventListener('click',function handler(e){
      if(!panel.contains(e.target)){
        panel.remove();
        document.removeEventListener('click',handler);
      }
    });
  },50);
}

  var ca=document.getElementById('content-area');
  ca.innerHTML=(map[sc]||function(){return '';})();
  ca.className='content fade'+(sc==='files'?' no-pad':'');

  // hide sidebar on pre-onboarding screens
  var preonboard=['login','courses','topic','group'];
  document.getElementById('sidebar').style.display=
    (preonboard.indexOf(sc)>-1&&!S.onboarded)?'none':'flex';
  // show supervisor in sidebar always after onboarding
  if(sc==='supervisor'&&S.onboarded){
    document.getElementById('sidebar').style.display='flex';
  }

  attachEvents(sc);
}

function attachEvents(sc){
  // nav items
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();goto(this.getAttribute('data-nav'));});
  });

  if(sc==='login'){
    var blb=document.getElementById('btn-login-back');
    if(blb) blb.addEventListener('click',function(){goto('courses');});
    document.getElementById('btn-login').addEventListener('click',function(){goto('courses');});
  }
  if(sc==='courses'){
    S._visitedCourses=true;
    document.getElementById('goto-ts2').addEventListener('click',function(){goto(S.onboarded?'dashboard':'topic');});
  }
  if(sc==='topic'){
    document.querySelectorAll('.cat-item').forEach(function(el){
      el.addEventListener('click',function(){
        S.topic.cat=this.getAttribute('data-cat');
        document.querySelectorAll('.cat-item').forEach(function(x){x.classList.remove('sel');});
        this.classList.add('sel');
      });
    });
    document.getElementById('btn-topic-next').addEventListener('click',function(){
      S.topic.name=document.getElementById('inp-tname').value.trim();
      S.topic.title=document.getElementById('inp-ttitle').value.trim();
      S.topic.desc=document.getElementById('inp-tdesc').value.trim();
      if(!S.topic.name||!S.topic.title){toast('Please fill in topic name and title');return;}
      goto('supervisor');
    });
  }
  if(sc==='supervisor'){
    document.querySelectorAll('[data-sup-open]').forEach(function(el){
      el.addEventListener('click',function(){S._supOpen=this.getAttribute('data-sup-open');render();});
    });
    var bsb=document.getElementById('btn-sup-back');
    if(bsb) bsb.addEventListener('click',function(){S._supOpen=null;render();});
    document.querySelectorAll('[data-sup-sel]').forEach(function(el){
      el.addEventListener('click',function(){
        var id=this.getAttribute('data-sup-sel');
        S.supervisor=SUPS.filter(function(s){return s.id===id;})[0];
        S._supOpen=null;
        toast('Supervision request sent to '+S.supervisor.name);
        setTimeout(function(){goto(S.onboarded?'dashboard':'group');},800);
      });
    });
  }
  if(sc==='group'){
    document.querySelectorAll('.type-btn').forEach(function(el){
      el.addEventListener('click',function(){S.projectType=this.getAttribute('data-type');render();});
    });
    var bam=document.getElementById('btn-addmem');
    if(bam){
      bam.addEventListener('click',function(){
        var v=document.getElementById('inp-memid').value.trim();
        if(!v){return;}
        S.members.push({id:v,name:'Student '+v,ini:v.slice(0,2).toUpperCase()});
        document.getElementById('inp-memid').value='';
        render(); toast('Invite sent to '+v);
      });
    }
    document.getElementById('btn-start').addEventListener('click',function(){
      var n=document.getElementById('inp-pname').value.trim();
      if(!n){toast('Please enter a project name');return;}
      S.projectName=n; S.onboarded=true;
      goto('dashboard');
    });
  }
  if(sc==='dashboard'){
    document.querySelectorAll('[data-wk]').forEach(function(el){
      el.addEventListener('click',function(){
        S.openWeek=parseInt(this.getAttribute('data-wk'));
        goto('weekdetail');
      });
    });
    var bfs=document.getElementById('btn-final-submit');
    if(bfs){
      bfs.addEventListener('click',function(){
        var modal=document.createElement('div');
        modal.className='modal-overlay';
        modal.innerHTML='<div class="modal-box">'
          +'<div class="modal-icon" style="background:var(--blue-light);color:var(--blue)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div>'
          +'<p class="modal-title">Submit your thesis?</p>'
          +'<p class="modal-sub">You are about to submit your final thesis.<br>Make sure all sections are reviewed and approved.<br><span style="color:var(--red);font-size:13px">This action cannot be undone.</span></p>'
          +'<div class="modal-actions">'
          +'<button class="btn btn-sm" id="modal-cancel-fs">Cancel</button>'
          +'<button class="btn btn-primary btn-sm" id="modal-confirm-fs">'+ic('flag',14)+' Submit thesis</button>'
          +'</div></div>';
        document.body.appendChild(modal);
        document.getElementById('modal-cancel-fs').addEventListener('click',function(){modal.remove();});
        document.getElementById('modal-confirm-fs').addEventListener('click',function(){
          modal.remove();
          var done=document.createElement('div');
          done.className='modal-overlay';
          done.innerHTML='<div class="modal-box">'
            +'<div class="modal-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
            +'<p class="modal-title">Thesis submitted!</p>'
            +'<p class="modal-sub">Congratulations! Your thesis has been submitted successfully.<br>You will receive a confirmation email shortly.</p>'
            +'<div class="modal-actions"><button class="btn btn-primary btn-sm" id="modal-ok-fs">Done</button></div>'
            +'</div>';
          document.body.appendChild(done);
          document.getElementById('modal-ok-fs').addEventListener('click',function(){done.remove();});
        });
        modal.addEventListener('click',function(e){if(e.target===modal) modal.remove();});
      });
    }
  }
  if(sc==='weekdetail'){
    document.querySelectorAll('[data-tc]').forEach(function(el){
      el.addEventListener('click',function(){
        var i=parseInt(this.getAttribute('data-tc'));
        var wid=S.openWeek;
        if(!S.taskChecks[wid]) S.taskChecks[wid]={};
        S.taskChecks[wid][i]=!S.taskChecks[wid][i];
        var done=0,total=WEEKS[wid].tasks.length;
        for(var k=0;k<total;k++){if(S.taskChecks[wid][k])done++;}
        WEEKS[wid].pct=Math.round((done/total)*100);
        if(done===total){WEEKS[wid].status='done';toast('Section complete!');}
        else if(done>0) WEEKS[wid].status='active';
        render();
      });
    });
    var ubw=document.getElementById('btn-upload-wk');
    if(ubw){
      ubw.addEventListener('click',function(){
        var name='Draft_'+WEEKS[S.openWeek].title.replace(/[^a-zA-Z0-9]/g,'_')+'_v1.pdf';
        S.uploadedFiles.unshift(name); toast('Draft uploaded: '+name);
      });
    }
  }
  if(sc==='meetings'){
    document.querySelectorAll('[data-bs]').forEach(function(el){
      el.addEventListener('click',function(){
        var i=parseInt(this.getAttribute('data-bs'));
        if(S.bookedSlots.indexOf(i)===-1){
          // show confirmation modal
          var sup=S.supervisor||SUPS[0];
          var modal=document.createElement('div');
          modal.className='modal-overlay';
          modal.id='booking-modal';
          modal.innerHTML='<div class="modal-box">'
            +'<div class="modal-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>'
            +'<p class="modal-title">Confirm booking</p>'
            +'<p class="modal-sub">Book a meeting with <strong>'+sup.name+'</strong> on<br><strong>'+SLOTS[i].l+'</strong>?<br><span style="font-size:13px;color:var(--text3)">Online via Teams · ~45 min</span></p>'
            +'<div class="modal-actions">'
            +'<button class="btn btn-sm" id="modal-cancel">Cancel</button>'
            +'<button class="btn btn-primary btn-sm" id="modal-confirm">'+ic('check',14)+' Confirm booking</button>'
            +'</div></div>';
          document.body.appendChild(modal);
          document.getElementById('modal-cancel').addEventListener('click',function(){
            modal.remove();
          });
          document.getElementById('modal-confirm').addEventListener('click',function(){
            S.bookedSlots.push(i);
            modal.remove();
            var gcal=googleCalUrl(SLOTS[i],sup.name);
            var ocal=outlookCalUrl(SLOTS[i],sup.name);
            // success popup
            var success=document.createElement('div');
            success.className='modal-overlay';
            success.innerHTML='<div class="modal-box">'
              +'<div class="modal-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
              +'<p class="modal-title">Meeting booked!</p>'
              +'<p class="modal-sub">Your meeting with <strong>'+sup.name+'</strong> is confirmed for<br><strong>'+SLOTS[i].l+'</strong>.<br><span style="font-size:12px;color:var(--text3)">A confirmation has been sent to your email.</span></p>'
              +'<p style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-align:center">Add to your calendar</p>'
              +'<div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">'
              +'<a href="'+gcal+'" target="_blank" class="cal-btn cal-btn-google">'
              +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
              +'Google Calendar</a>'
              +'<a href="'+ocal+'" target="_blank" class="cal-btn cal-btn-outlook">'
              +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
              +'Outlook</a>'
              +'</div>'
              +'<div class="modal-actions"><button class="btn btn-sm" id="modal-ok">Done</button></div>'
              +'</div>';
            document.body.appendChild(success);
            document.getElementById('modal-ok').addEventListener('click',function(){
              success.remove(); render();
            });
          });
          modal.addEventListener('click',function(e){if(e.target===modal) modal.remove();});
        }
      });
    });
  }
  if(sc==='files'){
    // file selection
    document.querySelectorAll('[data-fsel]').forEach(function(el){
      el.addEventListener('click',function(){
        S.activeFile=parseInt(this.getAttribute('data-fsel'));
        render();
        setTimeout(scrollChat,50);
      });
    });
    // upload
    var uf=document.getElementById('btn-upload-f');
    if(uf){
      uf.addEventListener('click',function(){
        var names=['Draft_v'+Math.ceil(Math.random()*3)+'_'+['Introduction','Methodology','Analysis'][Math.floor(Math.random()*3)]+'.pdf','Chapter_notes.docx','Revised_draft.pdf'];
        var n=names[Math.floor(Math.random()*names.length)];
        S.uploadedFiles.unshift(n);
        S.activeFile=0;
        toast('File uploaded: '+n);
        render(); setTimeout(scrollChat,50);
      });
    }
    // send message
    function sendMsg(){
      var inp=document.getElementById('chat-inp');
      var txt=inp?inp.value.trim():'';
      if(!txt) return;
      if(!S.chats[S.activeFile]) S.chats[S.activeFile]=[];
      var now=new Date();
      var timeStr=now.getDate()+' Jun, '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
      S.chats[S.activeFile].push({from:'me',text:txt,time:timeStr});
      inp.value=''; inp.style.height='42px';
      render(); setTimeout(scrollChat,50);
      // simulate supervisor reply after 1.5s
      setTimeout(function(){
        var replies=[
          'Thank you for sharing this. I will review it and get back to you shortly.',
          'Good progress! I have a few comments — I will send them after I read through the full draft.',
          'Looks like a solid direction. Can you elaborate a bit more on the methodology choice?',
          'I will review this before our next meeting. Keep going!',
          'Nice work on this section. Make sure to link it back to your research questions.',
        ];
        var rep=replies[Math.floor(Math.random()*replies.length)];
        var now2=new Date();
        var t2=now2.getDate()+' Jun, '+String(now2.getHours()).padStart(2,'0')+':'+String(now2.getMinutes()).padStart(2,'0');
        S.chats[S.activeFile].push({from:'sup',text:rep,time:t2});
        if(S.screen==='files'){render();setTimeout(scrollChat,50);}
      },1500);
    }
    var btn=document.getElementById('btn-send-chat');
    if(btn) btn.addEventListener('click',sendMsg);
    var inp=document.getElementById('chat-inp');
    if(inp){
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
      });
      inp.addEventListener('input',function(){
        this.style.height='42px';
        this.style.height=Math.min(this.scrollHeight,120)+'px';
      });
    }
    setTimeout(scrollChat,50);
  }
}

render();
</script>


</body></html>
